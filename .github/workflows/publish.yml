# Build and publish `taskbundle` to (Test)PyPI.
#
# Two ways to run it:
#   • push a version tag      →  git tag v0.1.0 && git push origin v0.1.0   (publishes to PyPI)
#   • manually from the UI    →  Actions ▸ Publish ▸ "Run workflow"         (pick testpypi / pypi)
#
# Auth is via PyPI Trusted Publishing (OIDC) — no API tokens or secrets to manage.
# ONE-TIME SETUP before the first run (see the chat summary for the click-path):
#   1. PyPI:     https://pypi.org/manage/account/publishing/      → add a *pending* publisher
#   2. TestPyPI: https://test.pypi.org/manage/account/publishing/ → add a *pending* publisher
#      For each, use:  owner=yatharthk2  repo=taskbundle  workflow=publish.yml  environment=pypi (or testpypi)
name: Publish

on:
  push:
    tags: ["v*"]            # e.g. v0.1.0 — always publishes to the real PyPI
  workflow_dispatch:
    inputs:
      target:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi    # safe default: a manual click won't hit real PyPI unless you pick it

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build & check
        working-directory: cli          # the package lives in cli/
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/taskbundle/
    permissions:
      id-token: write                   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish → PyPI
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/taskbundle/
    permissions:
      id-token: write                   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
